# CI/CD: on push to main → build & deploy to server via SSH.
#
# Required GitHub secrets:
#   DEPLOY_HOST       — ssh host (e.g. 91.227.181.162 or children.evolvenext.net)
#   DEPLOY_PORT       — ssh port (e.g. 22022; defaults to 22 if unset)
#   DEPLOY_USER       — ssh user (e.g. odoo)
#   DEPLOY_SSH_KEY    — private key (id_ed25519 contents)
#   DEPLOY_PATH       — absolute path to project root on server
#   DEPLOY_BRANCH     — (optional) branch to deploy, default: main
#
# The server must have:
#   - the repo cloned at $DEPLOY_PATH
#   - node/npm installed
#   - scripts/deploy.sh executable
#   - at least one of: PM2, systemd unit, ISPmanager, or auto-restart.sh running

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install backend deps
        working-directory: backend
        run: npm ci --no-audit --no-fund
      - name: Run backend unit tests
        working-directory: backend
        run: npm test -- --ci

  test-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          # No `cache: 'npm'` here on purpose: combined with `npm install`
          # (not `npm ci`) the cache layer sometimes hands a corrupted
          # state to the resolver and the install bails with
          # "Invalid Version:". The install is fast enough without it (~5s).
      # `npm ci` would fail here because vitest@4 pulls optional native
      # deps (@emnapi/core, esbuild platform variants) that only resolve
      # to a full lock entry on the OS where `npm install` was run. Our
      # lock is generated on macOS — Linux entries are missing. `npm
      # install` walks the resolver on CI's Linux and grabs whatever
      # optionals it actually needs. This is a test-only job; the deploy
      # job still goes through `npm ci --omit=optional` in
      # scripts/deploy.sh on the server.
      - name: Show env (debug)
        working-directory: web
        run: |
          echo "node:"; node --version
          echo "npm:";  npm --version
          echo "lockfileVersion:"; node -e "console.log(JSON.parse(require('fs').readFileSync('package-lock.json','utf8')).lockfileVersion)"
      - name: Install web deps
        working-directory: web
        run: npm install --no-audit --no-fund --no-save --legacy-peer-deps
      - name: Dump npm debug log on failure
        if: failure()
        run: |
          ls -la /home/runner/.npm/_logs/ || true
          tail -200 /home/runner/.npm/_logs/*-debug-0.log || true
      - name: Run web unit tests (vitest)
        working-directory: web
        run: npm test

  deploy:
    needs: [test-backend, test-web]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          # First SSH attempt can race with cold runner / fail2ban / network
          # blips — we saw a real timeout in prod once. Retry instead of
          # leaving the box on stale code with no signal.
          timeout: 60s
          command_timeout: 15m
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            ./scripts/deploy.sh "${{ secrets.DEPLOY_BRANCH || 'main' }}"
